<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Últimos Movimientos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

    <div class="card shadow card-wallet">

        <div class="card-body">

            <h2 class="text-center mb-4">
                Últimos Movimientos
            </h2>

            <div id="listaMovimientos">
                <!-- generado dinámicamente con JavaScript -->
            </div>

            <a href="menu.html"
               class="btn btn-secondary w-100 mt-3">
                Volver
            </a>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="wallet.js"></script>
<script>
    $(function () {
        const movimientos = getMovimientos();
        const $contenedor = $('#listaMovimientos');

        if (movimientos.length === 0) {
            $contenedor.html('<p class="text-muted text-center">Todavía no hiciste ningún movimiento.</p>');
            return;
        }

        $contenedor.html(movimientos.map(function (mov) {
            const esNegativo = mov.monto < 0;
            const signo = esNegativo ? '-' : '+';
            const colorClase = esNegativo ? 'text-danger' : 'text-success';
            return (
                '<div class="transaction-item">' +
                    '<div class="d-flex justify-content-between">' +
                        '<strong>' + mov.tipo + '</strong>' +
                        '<span class="' + colorClase + '">' + signo + ' ' + formatCurrency(Math.abs(mov.monto)) + '</span>' +
                    '</div>' +
                    '<div class="text-muted small">' + mov.detalle + '</div>' +
                    '<div class="text-muted small">' + mov.fecha + '</div>' +
                '</div>'
            );
        }).join(''));
    });
</script>

</body>
</html>
