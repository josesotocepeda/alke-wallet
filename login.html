<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inicio de Sesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <div class="card shadow card-wallet">
        <div class="card-body">

            <h2 class="text-center mb-4">
                Inicio de sesión
            </h2>

            <div id="alertContainer"></div>

            <form id="loginForm">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           id="email"
                           class="form-control"
                           placeholder="correo@ejemplo.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password"
                           id="password"
                           class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Iniciar sesión
                </button>

            </form>

            <p class="text-muted text-center mt-3 mb-0" style="font-size: 0.85rem;">
                Usuario demo: usuario@billetera.com / 1234
            </p>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="wallet.js"></script>
<script>
    // Credenciales válidas para esta demo.
    const CREDENCIALES = {
        email: 'usuario@billetera.com',
        password: '1234'
    };

    $(function () {
        $('#loginForm').submit(function (e) {
            e.preventDefault();

            const email = $('#email').val().trim();
            const password = $('#password').val();

            if (!email || !password) {
                mostrarAlerta('alertContainer', 'Por favor completá el email y la contraseña.', 'warning');
                return;
            }

            if (email === CREDENCIALES.email && password === CREDENCIALES.password) {
                mostrarAlerta('alertContainer', '¡Inicio de sesión exitoso! Redirigiendo al menú principal...', 'success');
                $('#loginForm button').prop('disabled', true);
                setTimeout(function () {
                    window.location.href = 'menu.html';
                }, 1200);
            } else {
                mostrarAlerta('alertContainer', 'Email o contraseña incorrectos. Probá de nuevo.', 'danger');
            }
        });
    });
</script>

</body>
</html>
