<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menú Principal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div class="card shadow card-wallet">

        <div class="card-body text-center">

            <h2>Menú Principal</h2>

            <hr>

            <h5>Saldo Disponible</h5>

            <div class="balance" id="saldoDisplay">
                $0
            </div>

            <div id="alertContainer"></div>

            <div class="d-grid gap-3 mt-4">

                <button type="button"
                        class="btn btn-success"
                        onclick="irA('Depositar', 'deposit.html')">
                    Depositar
                </button>

                <button type="button"
                        class="btn btn-warning"
                        onclick="irA('Enviar Dinero', 'sendmoney.html')">
                    Enviar Dinero
                </button>

                <button type="button"
                        class="btn btn-info"
                        onclick="irA('Últimos Movimientos', 'transactions.html')">
                    Últimos Movimientos
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="wallet.js"></script>
<script>
    $(function () {
        $('#saldoDisplay').text(formatCurrency(getSaldo()));
    });

    function irA(nombrePantalla, url) {
        mostrarAlerta('alertContainer', 'Redirigiendo a ' + nombrePantalla + '...', 'info');
        setTimeout(function () {
            window.location.href = url;
        }, 900);
    }
</script>

</body>
</html>
